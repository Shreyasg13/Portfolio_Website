name: Build & Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build ──────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false   # prevents React treating warnings as build errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      deploy_url: ${{ steps.netlify_deploy.outputs.deploy-url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Deploy to Netlify
        id: netlify_deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./build"
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }} — ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

  # ── Job 3: Post-Deploy Verification ───────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for CDN propagation
        run: sleep 20

      - name: Check site is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://shreyashportfolio.netlify.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Site returned $STATUS"
            exit 1
          fi
          echo "✅ Site is responding with 200"

      - name: Verify new content is deployed
        run: |
          BUNDLE=$(curl -s https://shreyashportfolio.netlify.app/ | grep -o 'main\.[a-f0-9]*\.js' | head -1)
          echo "Deployed bundle: $BUNDLE"

          CONTENT=$(curl -s "https://shreyashportfolio.netlify.app/static/js/$BUNDLE")

          for keyword in "Platform AI Architect" "EMC AI Core" "3,000" "vLLM" "DeepSeek"; do
            if echo "$CONTENT" | grep -q "$keyword"; then
              echo "✅ Found: $keyword"
            else
              echo "❌ Missing: $keyword"
              exit 1
            fi
          done

          echo "✅ All content checks passed — deployment verified"

      - name: Print live URL
        run: echo "🚀 Live at https://shreyashportfolio.netlify.app/"
