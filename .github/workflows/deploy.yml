name: Build & Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build ──────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
          REACT_APP_GIT_SHA: ${{ github.sha }}
          REACT_APP_GA_MEASUREMENT_ID: ${{ secrets.REACT_APP_GA_MEASUREMENT_ID }}

      - name: Confirm version is embedded
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          if grep -r "$SHORT" build/; then
            echo "✅ Git SHA $SHORT found in build"
          else
            echo "⚠️  Git SHA not found — GA_MEASUREMENT_ID may also be missing"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      deploy_url: ${{ steps.netlify_deploy.outputs.deploy-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Deploy to Netlify
        id: netlify_deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./build"
          functions-dir: "netlify/functions"
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "🚀 ${{ github.sha }} — ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

  # ── Job 3: Post-Deploy Verification ───────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for CDN propagation
        run: sleep 20

      - name: Check site returns HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://shreyashportfolio.netlify.app/)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ Site returned $STATUS" && exit 1)
          echo "✅ Site is live"

      - name: Verify deploy version matches this commit
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          BUNDLE=$(curl -s https://shreyashportfolio.netlify.app/ | grep -o 'main\.[a-f0-9]*\.js' | head -1)
          echo "Deployed bundle: $BUNDLE"
          CONTENT=$(curl -s "https://shreyashportfolio.netlify.app/static/js/$BUNDLE")
          if echo "$CONTENT" | grep -q "$SHORT"; then
            echo "✅ Commit $SHORT is live in the bundle"
          else
            echo "❌ Commit $SHORT not found — CDN may still be propagating"
            exit 1
          fi

      - name: Verify key content strings are live
        run: |
          BUNDLE=$(curl -s https://shreyashportfolio.netlify.app/ | grep -o 'main\.[a-f0-9]*\.js' | head -1)
          CONTENT=$(curl -s "https://shreyashportfolio.netlify.app/static/js/$BUNDLE")
          PASS=true
          for kw in "Platform AI Architect" "Governed Multi-Tenant AI Platform" "3,000" "vLLM" "DeepSeek"; do
            if echo "$CONTENT" | grep -q "$kw"; then
              echo "✅ $kw"
            else
              echo "❌ $kw — missing from live bundle"
              PASS=false
            fi
          done
          $PASS || exit 1
          echo "✅ All content checks passed"

      - name: Summary
        run: |
          echo "🚀 Deployed: https://shreyashportfolio.netlify.app/"
          echo "📦 Commit:   ${{ github.sha }}"
          echo "👤 Visitor tracking: GA4 active (check Google Analytics Real-Time)"
